# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "pnpm build"
  publish = "dist/client"
[dev]
    command = "pnpm dev"
    port = 3000

# Redirect mario.dev to belco.dev
[[redirects]]
  from = "https://mario.dev/*"
  to = "https://belco.dev/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.mario.dev/*"
  to = "https://belco.dev/:splat"
  status = 301
  force = true